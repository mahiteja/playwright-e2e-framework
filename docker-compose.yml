version: '3.9'

services:
  playwright-tests:
    image: mcr.microsoft.com/playwright:v1.46.0-jammy
    working_dir: /work
    environment:
      TEST_ENV: test
      CI: 'true'
    volumes:
      - ./:/work
    ipc: host
    command: >
      bash -lc "
      npm ci &&
      npm run lint &&
      npm run test:test &&
      npm run allure:gen
      "
